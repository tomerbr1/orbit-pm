name: Feature request
description: Suggest a new capability or improvement for orbit
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. The most useful requests start with the concrete problem you're trying to solve rather than the solution, so there's room to think about whether a simpler path exists or if orbit already has something close.

  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: Describe the situation where you felt orbit was missing something.
      placeholder: |
        When I'm doing X, I wish orbit would Y because Z.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think orbit should solve it? Sketches, API ideas, or UI mockups welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they didn't quite fit.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Which component?
      description: Where would this feature live?
      options:
        - Plugin core (commands, hooks, MCP tools)
        - Dashboard
        - Orbit Auto
        - Statusline
        - Orbit DB
        - Docs
        - Other / not sure
      default: 6
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps understand the use case - screenshots, other tools you compared to, related issues, etc.
    validations:
      required: false
